backend:
  image:
    repository: ghcr.io/nashtech-garage/yas-location
    tag: latest
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  nameOverride: location
  fullnameOverride: location
  databaseName: location
  ingress:
    enabled: false
